name: CI

on:
  push:
  pull_request:

jobs:
  check:
    name: Typecheck, Lint, BOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.5.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (Biome)
        run: pnpm exec biome check

      - name: BOM check (UTF-8 BOM in .ts/.tsx files)
        run: |
          bom_files=$(git ls-files '*.ts' '*.tsx' | while read -r f; do
            head -c 3 "$f" | od -An -tx1 | grep -q 'ef bb bf' && echo "$f"
          done)
          if [ -n "$bom_files" ]; then
            echo "ERROR: These files start with a UTF-8 BOM:"
            echo "$bom_files"
            exit 1
          fi
          echo "BOM check passed — no BOM-prefixed files found."
